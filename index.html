<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطاقة شكر - مدرسة الرياض الثانوية بالزلفي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            min-height: 100vh;
            background: url('images/bg-card.png') center/cover no-repeat fixed;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(6px);
            z-index: 0;
        }

        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 30px 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
        }

        .header {
            margin-bottom: 25px;
        }
        .header img {
            width: 100px;
            margin-bottom: 10px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 900;
            color: #1e3c72;
            margin: 0;
            line-height: 1.4;
        }
        .header .sub {
            font-size: 16px;
            color: #444;
            margin-top: 5px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }
        label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1e3c72;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            background: #fff;
            transition: 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #1e3c72;
            outline: none;
            box-shadow: 0 0 0 4px rgba(30,60,114,0.1);
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .preview-btn {
            background: #1e3c72;
            color: #fff;
            border: none;
            padding: 14px 30px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
        }
        .preview-btn:hover {
            background: #2a5298;
        }

        .card-preview-section {
            margin-top: 30px;
            display: none;
        }
        .card-preview-section.active {
            display: block;
        }

        #thankCard {
            width: 100%;
            max-width: 500px;
            margin: 0 auto 20px;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            background: #fff;
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
            aspect-ratio: 500 / 700;
        }

        .card-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('images/bg-card.png') center/cover no-repeat;
            z-index: 0;
        }

        .card-content {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            padding: 28% 12% 8%;
        }

        .card-content .message-text {
            font-size: 17px;
            font-weight: 700;
            line-height: 1.9;
            margin-bottom: 20px;
            color: #0a1f3b;
            white-space: pre-line;
            flex-grow: 1;
            display: flex;
            align-items: center;
            text-shadow: 0 1px 2px rgba(255,255,255,0.7);
        }

        .card-content .student-name {
            font-size: 16px;
            font-weight: 700;
            background: #1e3c72;
            color: #fff;
            padding: 6px 18px;
            border-radius: 20px;
            display: inline-block;
            margin-top: auto;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .btn-download {
            background: #1e3c72;
            color: #fff;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* قسم التخصيص المخفي */
        #customSection {
            display: none;
            margin-top: 20px;
            text-align: right;
        }
        #customSection.active {
            display: block;
        }

        @media (max-width: 500px) {
            .app-container {
                padding: 20px 15px;
            }
            .card-content .message-text {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <img src="images/logo.png" alt="شعار المدرسة">
            <h1>مدرسة الرياض الثانوية بالزلفي</h1>
            <div class="sub">بطاقة شكر وتقدير من خريج</div>
        </div>

        <div class="form-group">
            <label>اسم الطالب: </label>
            <input type="text" id="studentName" placeholder="اكتب اسمك هنا...">
        </div>

        <div class="form-group">
            <label>اختر الشخص الذي تريد شكره</label>
            <select id="personSelect">
                <option value="" disabled selected>-- اختر --</option>
                <option value="father">الأب</option>
                <option value="mother">الأم</option>
                <option value="brother">الأخ</option>
                <option value="sister">الأخت</option>
                <option value="teacher">المعلم</option>
                <option value="uncle_p">العم</option>
                <option value="uncle_m">الخال</option>
                <option value="principal">مدير المدرسة</option>
                <option value="counselor">الموجه الطلابي</option>
                <option value="custom">✨ آخر (تخصيص شخص آخر)</option>
            </select>
        </div>

        <!-- قسم التخصيص يظهر فقط عند اختيار "آخر" -->
        <div id="customSection">
            <div class="form-group">
                <label>اختر نموذج رسالة جاهز أو اكتب رسالتك</label>
                <select id="customTemplate">
                    <option value="" disabled selected>-- اختر نموذجاً --</option>
                    <option value="friend">صديق / صديقة</option>
                    <option value="cousin_p">ابن العم / بنت العم</option>
                    <option value="cousin_m">ابن الخال / بنت الخال</option>
                    <option value="classmate">زميل دراسة</option>
                    <option value="neighbor">جار / جارة</option>
                    <option value="coach">مدرب / مدربة</option>
                    <option value="free">🖊️ رسالة مخصصة (أكتبها بنفسي)</option>
                </select>
            </div>
        </div>

        <!-- حقل نص الرسالة الموحد (يظهر دائماً) -->
        <div class="form-group">
            <label>نص الرسالة (يمكنك التعديل)</label>
            <textarea id="messageText" placeholder="ستظهر الرسالة هنا بعد الاختيار..."></textarea>
        </div>

        <button class="preview-btn" id="generateBtn">✨ إظهار البطاقة ومعاينتها</button>

        <div class="card-preview-section" id="previewSection">
            <div id="thankCard">
                <div class="card-bg"></div>
                <div class="card-content">
                    <div class="message-text" id="cardMessage">الرسالة ستظهر هنا</div>
                    <div class="student-name" id="cardStudentName">اسم الطالب</div>
                </div>
            </div>
            <div class="actions">
                <button class="btn btn-download" id="downloadBtn">📥 تحميل البطاقة</button>
            </div>
        </div>
    </div>

    <script>
        // الرسائل الأساسية
        const messages = {
            father: "والدي الغالي، سندي ومصدر إلهامي. لم تكن هذه الرحلة لتكتمل لولا دعمك اللامحدود وتضحياتك العظيمة. اليوم، وأنا أطوي صفحة المرحلة الثانوية، أهديك نجاحي الذي هو ثمرة غرسك وسهرك. دمت لي فخراً وعزاً أتباهى به.",
            mother: "أمي الحبيبة، جنة قلبي وسر توفيقي. كل نجاح أحققه هو استجابة لدعواتك الصادقة ونتاج حنانك الذي لا ينضب. وأنا أحتفل بتخرجي اليوم، أطبع قبلة امتنان على جبينكِ، راجياً أن أكون دائماً عند حسن ظنكِ ومصدر فخركِ.",
            brother: "أخي ورفيق دربي، وعضيدي الذي لا يميل. شكراً لوقوفك بجانبي في كل خطوة، ولتشجيعك المستمر الذي كان يدفعني للأمام. فرحة التخرج لا تكتمل إلا بوجودك، فشكراً لأنك السند الذي أتكئ عليه دائماً.",
            sister: "أختي الغالية، بهجة الأيام وابتسامة الإنجاز. شكراً لدعمكِ اللطيف وكلماتكِ التي كانت تزرع فيّ الأمل والتفاؤل في أصعب اللحظات. تخرجي اليوم هو فرحة نتقاسمها معاً، فشكراً لروحكِ الجميلة التي ترافقني.",
            teacher: "معلمي القدير، صانع الأجيال ومنارة العقول. لقد كنت لي أكثر من مجرد ناقل للمعرفة؛ كنت ملهماً ومربياً. بفضلك، أقف اليوم على عتبة التخرج مزوداً بالعلم والقيم. شكراً لعطائك الذي سيبقى أثره نابضاً في مسيرتي.",
            uncle_p: "عمي الغالي، رمز الحكمة والسند المتين. أعتز بوقوفك الدائم وتوجيهاتك القيمة التي أضاءت طريقي. في يوم تخرجي، أشاركك هذه الفرحة تقديراً لمكانتك الكبيرة في قلبي، ومحبتك الصادقة التي أعتز بها.",
            uncle_m: "خالي الحبيب، نبع الطيبة والقلب الكبير. شكراً لمشاركتك لي كل لحظات حياتي ولتشجيعك الذي يمنحني الثقة والطموح. اليوم، أحتفل بتخرجي وأنا فخور بأن أهديك جزءاً من هذا النجاح تقديراً لعطائك.",
            principal: "قائد صرحنا التعليمي، مديرنا الفاضل. بفضل قيادتكم الحكيمة وجهودكم المخلصة، كانت ثانوية الرياض بيئة محفزة للنجاح، وحاضنة للتفوق. شكراً لكم على كل ما قدمتموه لنا طوال هذه السنوات لنصل إلى هذه اللحظة الغالية.",
            counselor: "موجهي الفاضل، ومرشدي الأمين. شكراً لقلبك المفتوح واستماعك الدائم، ولنصائحك التي ذللت الصعاب وأنارت لي الطريق. لقد كان لتوجيهك ودعمك النفسي أثر بالغ في وصولي إلى منصة التخرج اليوم بثقة وعزيمة راسخة."
        };

        // نماذج الرسائل المخصصة
        const customTemplates = {
            friend: "صديقي العزيز، رفيق الدرب وشريك الذكريات. شكراً لأنك كنت دائماً بجانبي في كل خطوة، تشاركني الفرح وتخفف عني التعب. تخرجي اليوم هو ثمرة لمحبتك ودعمك الصادق، فأهديك هذا النجاح بكل فخر.",
            cousin_p: "ابن عمي الغالي، قريب الروح ورفيق العمر. لطالما كانت كلماتك وتشجيعك نبراساً لي. في يوم تخرجي، أتذكر وقوفك الدائم بجانبي، فأشاركك الفرحة وأهديك جزءاً من هذا الإنجاز تقديراً لمكانتك في قلبي.",
            cousin_m: "ابن خالي الحبيب، الأخ الذي لم تلده أمي. شكراً لمساندتك الصادقة ولحضورك المميز في كل تفاصيل رحلتي. تخرجي اليوم هو فرحة لنا معاً، فشكراً لك من الأعماق على كل ما قدمته.",
            classmate: "زميلي العزيز، رفيق المقعد وأجمل الأوقات. قضينا سوياً سنوات من الجد والاجتهاد والضحك. واليوم وأنا أتخرج، أتذكر كيف كنت دافعاً لي للأمام، فأشكرك من كل قلبي على الصحبة الجميلة.",
            neighbor: "جاري الكريم، قريب الدار وطيب الأثر. شكراً لمشاعرك النبيلة واهتمامك الدائم الذي كان يمدني بالطاقة الإيجابية. تخرجي اليوم هو مناسبة أشاركك إياها بكل محبة وامتنان.",
            coach: "مدربي الملهم، صانع الهمم وباني العزائم. علمتني أن النجاح لا يأتي إلا بالإصرار والثقة بالنفس. بفضلك وصلت إلى هذه اللحظة بقوة وإرادة، فشكراً جزيلاً على كل جهد بذلته من أجلي."
        };

        // العناصر
        const personSelect = document.getElementById('personSelect');
        const customSection = document.getElementById('customSection');
        const customTemplate = document.getElementById('customTemplate');
        const messageText = document.getElementById('messageText');
        const generateBtn = document.getElementById('generateBtn');
        const previewSection = document.getElementById('previewSection');
        const cardMessage = document.getElementById('cardMessage');
        const cardStudentName = document.getElementById('cardStudentName');
        const studentNameInput = document.getElementById('studentName');
        const downloadBtn = document.getElementById('downloadBtn');

        // تحديث حقل النص عند تغيير الاختيار الرئيسي
        personSelect.addEventListener('change', () => {
            const person = personSelect.value;
            
            if (person === 'custom') {
                // إظهار قسم النماذج المخصصة
                customSection.classList.add('active');
                // لا نملأ النص حتى يختار نموذجاً أو يكتب بنفسه
                messageText.value = '';
                customTemplate.value = '';
            } else {
                // إخفاء قسم النماذج المخصصة
                customSection.classList.remove('active');
                customTemplate.value = '';
                // ملء الرسالة الأساسية مباشرة
                if (person && messages[person]) {
                    messageText.value = messages[person];
                } else {
                    messageText.value = '';
                }
            }
        });

        // ملء حقل النص عند اختيار نموذج مخصص
        customTemplate.addEventListener('change', () => {
            const selected = customTemplate.value;
            if (selected === 'free') {
                messageText.value = ''; // يفرغ الحقل ليكتب الطالب بنفسه
            } else if (selected && customTemplates[selected]) {
                messageText.value = customTemplates[selected];
            }
        });

        // توليد البطاقة
        generateBtn.addEventListener('click', () => {
            const name = studentNameInput.value.trim();
            const person = personSelect.value;
            const finalMessage = messageText.value.trim();

            if (!name) return alert('يرجى كتابة اسم الطالب');
            if (!person) return alert('يرجى اختيار الشخص المراد شكره');
            if (!finalMessage) return alert('يرجى كتابة أو اختيار رسالة');

            cardMessage.textContent = finalMessage;
            cardStudentName.textContent = name;
            previewSection.classList.add('active');
        });

        // تحميل البطاقة
        downloadBtn.addEventListener('click', async () => {
            const card = document.getElementById('thankCard');
            try {
                const canvas = await html2canvas(card, { scale: 2, useCORS: true, allowTaint: true });
                const link = document.createElement('a');
                link.download = 'بطاقة-شكر.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (error) {
                alert('حدث خطأ أثناء تحميل الصورة، تأكد من وجود الصور في المسارات الصحيحة.');
            }
        });
    </script>
</body>
</html>
